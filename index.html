<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Navegación por Puntero</title>
    <style>
        /* 1. Ocultar el puntero en toda la pantalla */
        * {
            cursor: none !important;
            box-sizing: border-box;
        }

        /* 2. Asegurar que el body ocupe toda la pantalla sin márgenes */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evitar barras de desplazamiento */
        }

        /* 3. La cuadrícula de pruebas (Sandbox) */
        .cuadricula {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas iguales */
            grid-template-rows: repeat(3, 1fr);    /* 3 filas iguales */
            width: 100vw;
            height: 100vh;
        }

        /* 4. Estilo base para cada celda */
        .celda {
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-family: Arial, sans-serif;
            font-size: 24px;
            transition: all 0.2s ease; /* Transición suave al cambiar el foco */
        }

        /* 5. Estilo exclusivo para la celda enfocada (Estado de Foco Único) */
        .celda.enfocada {
            background-color: #4CAF50; /* Verde brillante */
            color: white;
            border-color: #fff;
            transform: scale(0.95); /* Pequeño efecto visual para indicar selección */
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }
    </style>
</head>
<body>

    <div class="cuadricula" id="tablero">
        <div class="celda" id="celda-0">0 (Sup Izq)</div>
        <div class="celda" id="celda-1">1 (Sup Cen)</div>
        <div class="celda" id="celda-2">2 (Sup Der)</div>
        <div class="celda" id="celda-3">3 (Med Izq)</div>
        <div class="celda" id="celda-4">4 (Centro)</div>
        <div class="celda" id="celda-5">5 (Med Der)</div>
        <div class="celda" id="celda-6">6 (Inf Izq)</div>
        <div class="celda" id="celda-7">7 (Inf Cen)</div>
        <div class="celda" id="celda-8">8 (Inf Der)</div>
    </div>

    <script>
        // --- MOTOR DE NAVEGACIÓN (EL CEREBRO) ---

        // Variables para gestionar el estado
        const celdas = document.querySelectorAll('.celda');
        let indiceEnfocado = 4; // Foco Inicial obligatorio en el centro (índice 4)

        // Función para aplicar el foco a una celda específica
        function aplicarFoco(nuevoIndice) {
            // Regla: Solo una celda enfocada a la vez.
            // Eliminamos la clase 'enfocada' de la celda actual
            celdas[indiceEnfocado].classList.remove('enfocada');
            
            // Actualizamos el índice y añadimos la clase a la nueva celda
            indiceEnfocado = nuevoIndice;
            celdas[indiceEnfocado].classList.add('enfocada');
            
            // Aquí podríamos emitir un evento personalizado indicando la dirección
            // (por ejemplo: "Se movió a la Flecha Arriba")
            console.log(`Foco movido a la celda: ${indiceEnfocado}`);
        }

        // Aplicar el foco inicial al cargar la página
        aplicarFoco(indiceEnfocado);

        // Lógica de Mapeo de Regiones al mover el puntero
        document.addEventListener('mousemove', (evento) => {
            // 1. Obtener dimensiones de la pantalla actual
            const anchoPantalla = window.innerWidth;
            const altoPantalla = window.innerHeight;

            // 2. Calcular el ancho y alto de cada una de las 3 columnas/filas
            const anchoZona = anchoPantalla / 3;
            const altoZona = altoPantalla / 3;

            // 3. Determinar en qué columna (0, 1 o 2) está el puntero
            // Math.floor redondea hacia abajo. Min() asegura que no exceda el índice 2 en bordes extremos.
            const columna = Math.min(Math.floor(evento.clientX / anchoZona), 2);
            
            // 4. Determinar en qué fila (0, 1 o 2) está el puntero
            const fila = Math.min(Math.floor(evento.clientY / altoZona), 2);

            // 5. Calcular el índice unidimensional (0 al 8) basado en la fila y columna
            // Fórmula: (fila * número de columnas) + columna
            const nuevoIndice = (fila * 3) + columna;

            // 6. Si el puntero ha entrado en una nueva zona, actualizamos el foco
            if (nuevoIndice !== indiceEnfocado) {
                aplicarFoco(nuevoIndice);
            }
        });
    </script>
</body>
</html>
