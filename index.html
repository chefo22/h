<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reparador de MP3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Reparador de MP3</h1>
        <p class="text-sm text-gray-600 mb-6 text-center">
            Reconstruye el índice de duración de tu archivo sin recodificar ni perder calidad.
        </p>
        
        <input type="file" id="fileInput" accept=".mp3" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 mb-4 cursor-pointer"/>
        
        <button id="startBtn" onclick="fixAudio()" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300">
            Reparar Archivo
        </button>

        <div id="loading" class="hidden mt-6 flex flex-col items-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-3" id="spinner"></div>
            <p id="status" class="text-sm text-blue-600 font-semibold text-center">Iniciando...</p>
        </div>

        <a id="downloadBtn" class="hidden mt-4 w-full block text-center bg-green-500 text-white font-bold py-3 px-4 rounded-lg hover:bg-green-600 transition duration-300">
            Descargar MP3 Reparado
        </a>

        <div class="mt-6 bg-gray-900 rounded-lg p-3 h-32 overflow-y-auto hidden" id="logContainer">
            <p class="text-xs text-green-400 font-mono break-words" id="log"></p>
        </div>
    </div>

    <script>
        const { FFmpeg } = FFmpegWASM;
        const { fetchFile, toBlobURL } = FFmpegUtil;
        let ffmpeg = null;

        async function initFFmpeg() {
            if (ffmpeg) return;
            ffmpeg = new FFmpeg();
            const logEl = document.getElementById('log');
            
            ffmpeg.on('log', ({ message }) => {
                logEl.innerHTML += message + '<br>';
                logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
            });
            
            const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
            
            // Aquí está el parche: convertimos los scripts externos en Blobs locales para burlar el bloqueo CORS de GitHub Pages
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm')
            });
        }

        async function fixAudio() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) {
                alert('Por favor, selecciona un archivo MP3 primero.');
                return;
            }
            
            const file = fileInput.files[0];
            const statusEl = document.getElementById('status');
            const loadingDiv = document.getElementById('loading');
            const downloadBtn = document.getElementById('downloadBtn');
            const startBtn = document.getElementById('startBtn');
            const logContainer = document.getElementById('logContainer');
            const spinner = document.getElementById('spinner');
            
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loadingDiv.classList.remove('hidden');
            logContainer.classList.remove('hidden');
            downloadBtn.classList.add('hidden');
            spinner.classList.remove('hidden');
            statusEl.classList.replace('text-green-600', 'text-blue-600');
            statusEl.classList.replace('text-red-600', 'text-blue-600');
            document.getElementById('log').innerHTML = '';
            
            try {
                statusEl.innerText = 'Cargando motor de procesamiento (puede tardar la primera vez)...';
                await initFFmpeg();
                
                statusEl.innerText = 'Leyendo archivo (consumiendo RAM temporal)...';
                await ffmpeg.writeFile('input.mp3', await fetchFile(file));
                
                statusEl.innerText = 'Reparando metadatos e índices de tiempo...';
                await ffmpeg.exec(['-i', 'input.mp3', '-c', 'copy', 'output.mp3']);
                
                statusEl.innerText = 'Preparando archivo final...';
                const data = await ffmpeg.readFile('output.mp3');
                
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'audio/mpeg' }));
                downloadBtn.href = url;
                downloadBtn.download = 'Reparado_' + file.name;
                downloadBtn.classList.remove('hidden');
                
                statusEl.innerText = '¡Proceso completado con éxito!';
                spinner.classList.add('hidden');
                statusEl.classList.replace('text-blue-600', 'text-green-600');
                
                await ffmpeg.deleteFile('input.mp3');
                await ffmpeg.deleteFile('output.mp3');
                
            } catch (error) {
                statusEl.innerText = 'Error: ' + error.message;
                statusEl.classList.replace('text-blue-600', 'text-red-600');
                spinner.classList.add('hidden');
            } finally {
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
