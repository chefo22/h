<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor de Navegación por Puntero</title>
    <style>
        /* * 1. REGLAS DE CONTROL Y VISIBILIDAD 
         * Ocultamos el cursor en toda la página y evitamos el scroll.
         */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            cursor: none; /* ¡Invisibilidad total del puntero! */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* * 2. EL ENTORNO DE PRUEBAS (SANDBOX)
         * Cuadrícula central de 3 columnas por 3 filas.
         */
        #grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 15px;
        }

        .cell {
            background-color: #313244;
            border: 2px solid #45475a;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #6c7086;
            transition: all 0.2s ease-in-out;
        }

        /* Estado de Foco Único */
        .cell.active {
            background-color: #cba6f7;
            border-color: #b4befe;
            color: #11111b;
            box-shadow: 0 0 20px rgba(203, 166, 247, 0.5);
            transform: scale(1.05);
        }

        /* * 3. SISTEMA DE MONITORIZACIÓN (DEBUG)
         * Panel informativo flotante en la esquina.
         */
        #debug-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(17, 17, 27, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #cba6f7;
            font-family: monospace;
            font-size: 14px;
        }

        .debug-row {
            margin: 5px 0;
        }
        .highlight { color: #a6e3a1; font-weight: bold; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <div class="debug-row">Posición Puntero: <span id="debug-pos" class="highlight">X: 0px, Y: 0px</span></div>
        <div class="debug-row">Celda Activa: <span id="debug-cell" class="highlight">Fila 2, Columna 2</span></div>
        <div class="debug-row">Último Movimiento: <span id="debug-dir" class="highlight">Ninguno (Inicio)</span></div>
    </div>

    <div id="grid">
        <div class="cell" id="cell-0-0">1,1</div>
        <div class="cell" id="cell-0-1">1,2</div>
        <div class="cell" id="cell-0-2">1,3</div>
        <div class="cell" id="cell-1-0">2,1</div>
        <div class="cell" id="cell-1-1">2,2</div>
        <div class="cell" id="cell-1-2">2,3</div>
        <div class="cell" id="cell-2-0">3,1</div>
        <div class="cell" id="cell-2-1">3,2</div>
        <div class="cell" id="cell-2-2">3,3</div>
    </div>

    <script>
        // --- EL CEREBRO DEL MOTOR ---

        // Variables de estado inicial (Foco en el centro: Fila 1, Col 1 en índice 0)
        let currentZoneX = 1; 
        let currentZoneY = 1;
        let lastDirection = "Ninguno (Inicio)";

        // Referencias a los elementos del DOM (Interfaz)
        const debugPos = document.getElementById('debug-pos');
        const debugCell = document.getElementById('debug-cell');
        const debugDir = document.getElementById('debug-dir');

        // Función para actualizar visualmente la cuadrícula
        function updateFocus(x, y) {
            // Limpiamos la clase 'active' de todas las celdas (Estado Único)
            document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('active'));
            
            // Construimos el ID de la celda y le añadimos el foco
            const targetCell = document.getElementById(`cell-${y}-${x}`);
            if (targetCell) {
                targetCell.classList.add('active');
            }
        }

        // Función para calcular la dirección como un D-Pad
        function getDirection(oldX, oldY, newX, newY) {
            let directions = [];
            
            if (newY < oldY) directions.push("Arriba");
            if (newY > oldY) directions.push("Abajo");
            if (newX < oldX) directions.push("Izquierda");
            if (newX > oldX) directions.push("Derecha");
            
            return directions.join(" y ");
        }

        // Establecer el foco inicial al cargar (Centro)
        updateFocus(currentZoneX, currentZoneY);

        // Escuchar el movimiento del ratón en todo el documento
        document.addEventListener('mousemove', (e) => {
            // 1. Captura de Datos Silenciosa (Coordenadas en píxeles)
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 2. Mapeo de Regiones Virtuales
            // Dividimos la posición actual entre un tercio de la pantalla
            const zoneWidth = window.innerWidth / 3;
            const zoneHeight = window.innerHeight / 3;

            // Calculamos en qué índice (0, 1 o 2) nos encontramos usando Math.floor
            let newZoneX = Math.floor(mouseX / zoneWidth);
            let newZoneY = Math.floor(mouseY / zoneHeight);

            // Persistencia: Limitamos los valores entre 0 y 2 para evitar errores en los bordes
            newZoneX = Math.max(0, Math.min(2, newZoneX));
            newZoneY = Math.max(0, Math.min(2, newZoneY));

            // 3. Traducción a Movimiento
            // Solo procesamos si el usuario realmente ha cambiado de zona virtual
            if (newZoneX !== currentZoneX || newZoneY !== currentZoneY) {
                lastDirection = getDirection(currentZoneX, currentZoneY, newZoneX, newZoneY);
                
                // Actualizamos nuestro estado interno
                currentZoneX = newZoneX;
                currentZoneY = newZoneY;
                
                // Actualizamos el foco en la interfaz
                updateFocus(currentZoneX, currentZoneY);
            }

            // 4. Panel de Monitorización (Debug)
            debugPos.textContent = `X: ${mouseX}px, Y: ${mouseY}px`;
            // Sumamos 1 para mostrar al usuario valores de 1 a 3 en lugar de 0 a 2
            debugCell.textContent = `Fila ${currentZoneY + 1}, Columna ${currentZoneX + 1}`;
            debugDir.textContent = lastDirection;
        });
    </script>
</body>
</html>
