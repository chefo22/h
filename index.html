n:sticky;top:0;background:var(--bg-color);z-index:100;box-shadow:none;left:0;right:0;}.date-number{color:var(--text-main);font-weight:400;}.date-header::after,.date-header::before{content:"";flex:1;height:1px;background:var(--accent-blue);margin:0 10px;opacity:0.5}#events-container{width:95%;max-width:500px;display:flex;flex-direction:column;gap:18px;transition:max-width .3s ease, opacity 0.3s ease, transform 0.3s ease; scroll-snap-type: y proximity; scroll-padding-top: 50px; min-height: 100vh;}.tab-transitioning{opacity: 0; transform: translateY(10px);}@media (min-width:768px){#events-container{max-width:600px}.date-header{max-width:100%}}@media (min-width:1200px){#events-container{max-width:800px;display:flex;flex-direction:column;gap:18px}.date-header{width:100%;margin:0 auto}.event-card{border-bottom:1px solid #222;padding:10px 0}.event-card:last-child, .event-card:has(+ .date-header){border-bottom:none}}.event-card{display:flex;flex-direction:column;gap:8px;padding-bottom:8px;width:100%;border-bottom:1px solid #222;transition:opacity 0.3s, filter 0.3s; scroll-snap-align: start; content-visibility: auto; contain-intrinsic-size: 1px 120px;contain:layout paint;}.event-finished{opacity:0.5;filter:grayscale(0.2) saturate(0.9);pointer-events:none}.competicion-title{color:var(--accent-blue);font-size:.65rem;font-weight:600;display:flex;align-items:center;gap:4px}.competicion-title::before{content: "";font-size:.55rem}.event-info{display:flex;align-items:center;font-size:.75rem;font-weight:500;margin-bottom:2px}.time{font-size:.6rem;color:#fff;margin-right:5px;white-space:nowrap}.time-separator{color:var(--accent-blue);margin-right:6px;font-weight:700}.vs-container{display:flex;align-items:center;gap:6px;flex-wrap:wrap;row-gap:4px;justify-content:space-between}.team-group{display:flex;align-items:center;gap:6px;white-space:nowrap}.team-group:last-child{margin-left:auto}.vs-text{color:var(--accent-blue);font-size:.55rem;font-weight:800;margin:0 1px}.team-logo{width:25px;height:25px;object-fit:contain;background:radial-gradient(circle, #ffffff 0%, #ffffff  32%, transparent 53%);}.channels-wrapper{display:flex;flex-direction:row;overflow-x:auto;gap:12px;margin-top:6px;padding:4px 2px 12px 2px;scrollbar-width:none;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;transform:translateZ(0);will-change:transform;}.channels-wrapper::-webkit-scrollbar{height:4px}.channels-wrapper::-webkit-scrollbar-thumb{background:var(--accent-blue);border-radius:10px}.channel-button{position:relative;background:var(--channel-bg);color:var(--text-main);border-radius:10px;text-align:center;font-size:.65rem;font-weight:600;border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;flex:0 0 119px;height:67px;scroll-snap-align:start;overflow:hidden;padding:8px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 6px rgba(0,0,0,.3)}.channel-button:active{transform:scale(0.92); background: rgba(255,255,255,0.1); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); border-color: var(--accent-blue);}.channel-logo{width:80%;height:80%;object-fit:contain}.btn-plus{position:absolute;bottom:0;right:0;width:40px;height:40px;background:transparent;color:transparent;display:flex;align-items:center;justify-content:center;z-index:10;cursor:pointer}.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;justify-content:center;align-items:center;z-index:2000}.modal-content{background:var(--card-bg);width:85%;max-width:280px;max-height:80vh;overflow-y:auto;border-radius:12px;padding:15px;border:1px solid var(--border-color)}.modal-title{margin-bottom:12px;font-size:.8rem;font-weight:700;text-align:center;color:var(--accent-blue)}.id-item{background:var(--channel-bg);padding:10px;margin-bottom:8px;border-radius:8px;font-size:.7rem;text-align:center;border:1px solid var(--border-color);cursor:pointer;display:flex;justify-content:space-between;align-items:center}.id-rating{color:var(--accent-blue);font-weight:700}.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:48px;background:var(--nav-bg);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;align-items:center;z-index:1000}.nav-item{display:flex;flex-direction:column;align-items:center;color:var(--text-muted);text-decoration:none;font-size:.55rem;font-weight:600;gap:2px;flex:1;cursor:pointer;transition: transform 0.1s;}.nav-item:active{transform: scale(0.85);}        .nav-item.active{color:var(--accent-blue)}.nav-icon{font-size:1rem}.material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 48}#status{position:fixed;top:50%;left:50%;transform:translate(-50%, -50%);z-index:10000;display:flex;align-items:center;justify-content:center}.spinner{width:48px;height:48px;border:5px solid color-mix(in srgb, var(--accent-blue) 20%, transparent);border-top:5px solid var(--accent-blue);border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}/* Corrección: El modo búsqueda ahora respeta el layout global */

    <div id="loader-container">

    </div><div id="status"><div class="spinner"></div></div><div id="searchContainer" style="display:none;width:95%;max-width:500px;margin:10px auto 0 auto;gap:8px;align-items:center;padding-bottom:10px;"><div style="position:relative;flex:1;display:flex;align-items:center"><input type="text" id="globalSearchInput" placeholder="Buscar canal, equipo o competición..." style="width:100%;padding:12px 40px 12px 16px;border-radius:12px;border:1px solid var(--border-color);background:var(--card-bg);color:#fff;font-size:.9rem;outline:0"><span id="clearSearch" style="position:absolute;right:12px;color:var(--text-muted);cursor:pointer;display:none;font-size:1.2rem;user-select:none">&times;</span></div></div><div id="events-container"></div>
<div id="noResultsContainer" style="display:none;text-align:center;padding:40px;color:var(--text-muted)"><div><div style="font-size:3rem;margin-bottom:10px;color:var(--accent-blue)" class="material-symbols-outlined">satellite_alt</div><div style="font-weight:700;font-size:1.1rem;color:var(--text-main)">Sin resultados</div><div style="font-size:.85rem;margin-top:5px;opacity:.8">Intenta con otra búsqueda</div></div></div><div id="ids-modal" class="modal-overlay" onclick="UIManager.closeModal(event)"><div class="modal-content" onclick="event.stopPropagation()"><div id="modal-title" class="modal-title">Canales</div><div id="ids-list" class="ids-list"></div></div></div><div id="player-modal"><div id="player-header"><div id="player-ch-name" style="font-weight:700;font-size:0.8rem;color:var(--accent-blue);text-transform:uppercase;letter-spacing:1px"></div><div id="player-status-text" style="font-size:0.6rem;color:#888"></div><div onclick="UIManager.closePlayer()" style="cursor:pointer;display:flex;align-items:center;color:white"><span class="material-symbols-outlined">close</span></div></div><div id="video-container"><video id="main-video" controls playsinline></video></div></div><nav class="bottom-nav"><div class="nav-item active" id="nav-home" onclick='UIManager.switchTab("home")'><span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span><span>EVENTOS</span></div><div class="nav-item" id="nav-channels" onclick='UIManager.switchTab("channels")'><span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></span><span>CANALES</span></div></nav><script>const CONFIG = {
            BASE_URL: 'https://www.futbolenlatv.es',
            TARGET_URL: 'https://www.futbolenlatv.es/deporte',
            GIST_LOGOS: 'https://gist.githubusercontent.com/Ciento20/5580f05d8ecab2a3de797d7ef4365406/raw/',
            EPG_XML: 'https://raw.githubusercontent.com/davidmuma/EPG_dobleM/master/guiatv.xml'
        };

        const STORAGE_CONFIG = {
            CACHE_KEY: 'ace_ids_cache',
            EXPIRATION_MS: 30 * 24 * 60 * 60 * 1000 // 30 días
        };        const RatingEngine = {
            DB_KEY: 'ace_autorating_v1',
            SESSION_KEY: 'ace_current_session',
            PENDING_KEY: 'ace_pending_penalties_list',
            interval: null,

            getDB() { return JSON.parse(localStorage.getItem(this.DB_KEY)) || {}; },
            
            getScore(id) { 
                const entry = this.getDB()[id];
                if (!entry) return 2.0;
                return (typeof entry === 'object') ? (entry.score || 2.0) : entry;
            },

            saveScore(id, delta, name = "") {
                const db = this.getDB();
                let entry = db[id];

                if (!entry || typeof entry !== 'object') {
                    entry = { score: entry || 2.0, name: name || "Desconocido" };
                }
                
                if (name) entry.name = name;
                entry.score = Math.max(0.0, Math.min(5.0, entry.score + delta));
                
                db[id] = entry;
                localStorage.setItem(this.DB_KEY, JSON.stringify(db));
            },            

            trackStart(id, channelName, index = 0) {
                this.checkPreviousSession(channelName);
                const now = Date.now();
                this.stopRealTimeUpdate();
                
                const sessionData = {
                    id: id, 
                    channelName: channelName, 
                    index: index,
                    start: now, 
                    lastProcessedMin: 0
                };
                
                localStorage.setItem(this.SESSION_KEY, JSON.stringify(sessionData));
                this.startRealTimeUpdate();
            },

            checkPreviousSession(newChannelName = null) {
                const session = JSON.parse(localStorage.getItem(this.SESSION_KEY));
                if (!session) return;
                
                const minutesSpent = Math.floor((Date.now() - session.start) / 60000);
                
                // Cómputo justo: Si vuelve tras mucho tiempo, recuperamos hasta 1.5 puntos (90 min)
                const recoveryPoints = Math.min(1.5, Math.floor(minutesSpent / 30) * 0.5);
                
                if (recoveryPoints > 0) {
                    this.saveScore(session.id, recoveryPoints, session.channelName);
                }
                
                // Si la sesión es antigua (>30min) o hay cambio de canal, cerramos para nueva sesión
                if (minutesSpent >= 30 || (newChannelName && newChannelName !== session.channelName)) {
                    localStorage.removeItem(this.SESSION_KEY);
                    if (minutesSpent >= 30) localStorage.removeItem(this.PENDING_KEY);
                }

                if (newChannelName && newChannelName === session.channelName) {
                    let penalty = 0;
                    if (minutesSpent < 5) penalty = -1.5;
                    else if (minutesSpent < 15) penalty = -1.0;
                    else if (minutesSpent < 25) penalty = -0.5;

                    if (penalty !== 0) {
                        this.saveScore(session.id, penalty, session.channelName);
                        localStorage.setItem(this.PENDING_KEY, JSON.stringify({ id: session.id, timestamp: Date.now() }));
                    }
                }
            },

            startRealTimeUpdate() {
                if (this.interval) clearInterval(this.interval);
                this.interval = setInterval(() => {
                    const session = JSON.parse(localStorage.getItem(this.SESSION_KEY));
                    if (!session) return this.stopRealTimeUpdate();
                    const min = (Date.now() - session.start) / 60000;
                    
                    if (min >= 30 && (min - session.lastProcessedMin) >= 30) {
                        this.saveScore(session.id, 0.5, session.channelName);
                        session.lastProcessedMin = Math.floor(min / 30) * 30;
                        localStorage.setItem(this.SESSION_KEY, JSON.stringify(session));
                    }
                }, 30000);
            },

            stopRealTimeUpdate() { if (this.interval) clearInterval(this.interval); }
        };        const cleanChannelName = (name) => {
            if (!name) return "";
            return name.normalize("NFD")
                       .replace(/[\u0300-\u036f]/g, "")
                       .toUpperCase()
                       .replace(/\b(HD|FHD|4K|1080P|1080|720|720P|SD|TVE|ES|SOLO EVENTOS|PLUS|BAR)\b/g, "")
                       .replace(/[\(\)\[\]\*]/g, " ")
                       .replace(/\s+/g, " ")
                       .trim();
        };

        const ComparisonEngine = {
            isMatch(nameA, nameB) {
                return getCanonicalName(nameA) === getCanonicalName(nameB);
            },
            normalizeText(text) {
                return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            }
        };        let channelLogosMap = JSON.parse(localStorage.getItem('logo_cache')) || {};
        let channelCanonicalMap = JSON.parse(localStorage.getItem('canonical_cache')) || {};
        let globalData = JSON.parse(localStorage.getItem('event_data_cache')) || [];
        let aceStreamMap = []; 
        let currentTab = localStorage.getItem('active_tab') || 'home';
        const state = { tvSearchTerm: localStorage.getItem('search_query') || '' };

        const getCanonicalName = (name) => {
            const clean = cleanChannelName(name);
            return channelCanonicalMap[clean] || clean;
        };        const NetworkService = {
            async fetchHtml(targetUrl) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                try {
                    const res = await fetch(targetUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!res.ok) throw new Error();
                    return await res.text();
                } catch (e) {
                    clearTimeout(timeoutId);
                    throw new Error("Error de conexión");
                }
            },
            async fetchLogos() {
                try {
                    const [gistRes, xmlRes] = await Promise.all([
                        fetch(CONFIG.GIST_LOGOS),
                        fetch(CONFIG.EPG_XML).catch(() => null)
                    ]);
                    
                    const text = await gistRes.text();
                    const logoMap = {};
                    const canonicalMap = {};
                    let currentAliases = [];

                    text.split('\n').forEach(line => {
                        const trimmed = line.trim();
                        if (!trimmed) return;

                        if (trimmed.includes(': http')) {
                            const parts = trimmed.split(': http');
                            const canonicalName = cleanChannelName(parts[0]);
                            const logoUrl = 'http' + parts[1].trim();
                            
                            logoMap[canonicalName] = logoUrl;
                            canonicalMap[canonicalName] = canonicalName;
                            
                            currentAliases.forEach(alias => {
                                canonicalMap[cleanChannelName(alias)] = canonicalName;
                            });
                            currentAliases = [];
                        } else {
                            currentAliases.push(trimmed);
                        }
                    });

                    if (xmlRes && xmlRes.ok) {
                        const xmlText = await xmlRes.text();
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                        const channels = xmlDoc.getElementsByTagName("channel");
                        const xmlLogosApplied = new Set();
                        
                        for (let i = 0; i < channels.length; i++) {
                            const channel = channels[i];
                            const displayNames = channel.getElementsByTagName("display-name");
                            const icon = channel.getElementsByTagName("icon")[0];
                            
                            if (displayNames.length > 0 && icon) {
                                // BLOQUEO: Si el XML dice que es un BAR, lo saltamos
                                let isBar = false;
                                for (let d = 0; d < displayNames.length; d++) {
                                    if (/\bBAR\b/i.test(displayNames[d].textContent)) {
                                        isBar = true; break;
                                    }
                                }
                                if (isBar) continue;

                                const logoUrl = icon.getAttribute("src");
                                if (logoUrl) {
                                    for (let j = 0; j < displayNames.length; j++) {
                                        const cleanName = cleanChannelName(displayNames[j].textContent);
                                        const canonicalName = canonicalMap[cleanName];
                                        
                                        if (canonicalName && !xmlLogosApplied.has(canonicalName)) {
                                            logoMap[canonicalName] = logoUrl;
                                            xmlLogosApplied.add(canonicalName);
                                            break;
                                        }
                                    }
                                }
                            }
                        }
                    }
                    return { logoMap, canonicalMap };
                } catch (e) { return null; }
            }
        };

        const AceStreamEngine = {
            SOURCES: [
                { id: 'ERA', url: 'https://ipfs.io/ipns/k2k4r8lm8tkmuxbc8lkmq1in3v0oya1p6pe9o5bu0hu30br5ko08k2gb/data/listas/listaplana.txt', parser: 'parseEra' },
                { id: 'ELCANO', url: 'https://ipfs.io/ipns/k51qzi5uqu5dh5qej4b9wlcr5i6vhc7rcfkekhrxqek5c9lk6gdaiik820fecs/hashes.json', parser: 'parseElcano' }
            ],generateHash(str){let hash=5381,i=str.length;while(i)hash=(hash*33)^str.charCodeAt(--i);return(hash>>>0).toString(16)},

            async init() {
                let masterMap = new Map();
                const cache = JSON.parse(localStorage.getItem(STORAGE_CONFIG.CACHE_KEY)) || { hashes: {}, data: [] };
                const currentHashes = cache.hashes || {};
                let hasChanges = false;cache.data.forEach(item => masterMap.set(item.id, item));

                for (const src of this.SOURCES) {
                    try {
                        const raw = await NetworkService.fetchHtml(src.url);
                        const newHash = this.generateHash(raw);if (currentHashes[src.id] === newHash) continue;
                        hasChanges = true;
                        currentHashes[src.id] = newHash;
                        
                        const parsed = src.parser === 'parseEra' ? this.parseEra(raw) : this.parseElcano(raw);
                        parsed.forEach(item => {
                            item.source = src.id === 'ELCANO' ? 'ELC' : 'ERA';
                            masterMap.set(item.id, item);
                        });} catch (e) {}
                }

                const master = Array.from(masterMap.values());

                if (hasChanges && master.length > 0) {
                    this.saveToCache(master, currentHashes);
                } else if (master.length === 0) {
                    return this.loadFromCache();
                }
                return master;
            },            saveToCache(data, hashes = {}) {
                const cacheObj = { 
                    timestamp: Date.now(), 
                    data: data, 
                    hashes: hashes 
                };
                localStorage.setItem(STORAGE_CONFIG.CACHE_KEY, JSON.stringify(cacheObj));
            },
            loadFromCache() {
                const cached = localStorage.getItem(STORAGE_CONFIG.CACHE_KEY);
                if (!cached) return [];
                try {
                    const cacheObj = JSON.parse(cached);
                    const isExpired = (Date.now() - cacheObj.timestamp) > STORAGE_CONFIG.EXPIRATION_MS;
                    return isExpired ? [] : (cacheObj.data || []);
                } catch (e) { return []; }
            },
            parseEra(text) {
                const results = [];
                const lines = text.split('\n').filter(l => l.trim());
                for (let i = 0; i < lines.length; i += 2) {
                    let name = lines[i].split('-->')[0].trim();
                    // Limpieza de sufijos de calidad específicos de ERA
                    name = name.replace(/\b(HDP|SDP|FHDP)\b/gi, '').trim();
                    const id = lines[i+1]?.trim().replace(/p$/, '');
                    if (id && id.length === 40) results.push({ name, id });
                }
                return results;
            },
            parseElcano(jsonStr) {
                try {
                    const data = JSON.parse(jsonStr);
                    const list = data.hashes || [];
                    return list.map(item => ({
                        name: item.title.trim(),
                        id: item.hash.trim(),
                        logo: item.logo || '',
                        group: item.group || ''
                    }));

                const streamUrl = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${id}`;
                const video = document.getElementById('main-video');
                const fallback = () => {
                    RatingEngine.trackStart(id, name, index);
                    window.location.href = 'acestream://' + id;
                };

                fetch(`http://127.0.0.1:6878/ace/status?id=${id}`).then(res => {
                    if(!res.ok) throw new Error();
                    document.getElementById('player-modal').style.display = 'flex';
                    document.getElementById('player-ch-name').textContent = name;
                    const statusText = document.getElementById('player-status-text');
                    statusText.textContent = 'Conectando al motor...';
                    
                    if (Hls.isSupported()) {
                        if(this.hls) this.hls.destroy();
                        this.hls = new Hls();
                        this.hls.loadSource(streamUrl);
                        this.hls.attachMedia(video);
                        this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            statusText.textContent = 'Reproduciendo (Ace Serve) ✓';
                            RatingEngine.trackStart(id, name, index);
                        });
                        this.hls.on(Hls.Events.ERROR, (e, data) => {
                            if(data.fatal) { this.closePlayer(); fallback(); }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = streamUrl;
                        video.play();
                            statusText.textContent = 'Reproduciendo (Ace Serve) ✓';
                            RatingEngine.trackStart(id, name, index);
                    } else {
                        fallback();
                    }
                }).catch(() => fallback());
            },

            closePlayer() {
                const video = document.getElementById('main-video');
                video.pause();
                video.src = "";
                if(this.hls) { this.hls.destroy(); this.hls = null; }
                document.getElementById('player-modal').style.display = 'none';
            },

            openIdsModal(event, channelName) {
                event.stopPropagation();
                const list = document.getElementById('ids-list');
                const title = document.getElementById('modal-title');
                
                const matching = aceStreamMap
                    .filter(a => ComparisonEngine.isMatch(channelName, a.name))
                    .sort((a, b) => RatingEngine.getScore(b.id) - RatingEngine.getScore(a.id));

                title.textContent = getCanonicalName(channelName);
                list.innerHTML = "";
                
                matching.forEach((item, i) => {
                    let currentRating = RatingEngine.getScore(item.id);
                    const pending = JSON.parse(localStorage.getItem(RatingEngine.PENDING_KEY));
                    if (pending && pending.id === item.id) {
                        currentRating = Math.max(0.0, currentRating - 1.5);
                    }
                    const btn = document.createElement('div');
                    btn.className = 'id-item';                    btn.innerHTML = `
                        <small style="flex: 1; text-align: left; color: var(--text-muted); font-size: 0.6rem; font-weight: 700; opacity: 0.6; letter-spacing: 0.5px;">${item.source || 'ID'}</small>
                        <span style="flex: 2; text-align: center; font-family: monospace; opacity: 0.9;">${item.id.substring(0, 10).toUpperCase()}</span>
                        <span class="id-rating" style="flex: 1; text-align: right;">★ ${currentRating.toFixed(1)}</span>
                    `;
                    btn.onclick = () => {
                        this.closeModal();
                        this.attemptPlay(item.id, getCanonicalName(channelName), i);
                    };
                    list.appendChild(btn);
                });
                this.modal.style.display = 'flex';
            },            closeModal() { this.modal.style.display = 'none'; },

            setRandomColor() {
                const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                document.documentElement.style.setProperty('--accent-blue', randomColor);
                localStorage.setItem('custom_accent_color', randomColor);
            }
        };        async function init() {
            const savedColor = localStorage.getItem('custom_accent_color');
            if (savedColor) document.documentElement.style.setProperty('--accent-blue', savedColor);

            let sT;
            const gInput = document.getElementById('globalSearchInput');
            const cBtn = document.getElementById('clearSearch');
            
            // Restaurar estado inicial de búsqueda e interfaz
            if (state.tvSearchTerm) {
                gInput.value = state.tvSearchTerm;
                cBtn.style.display = 'block';
            }
            UIManager.switchTab(currentTab);
            gInput.addEventListener('input', (e) => {
                cBtn.style.display = e.target.value ? 'block' : 'none';
                clearTimeout(sT);
                sT = setTimeout(() => {
                    const term = ComparisonEngine.normalizeText(e.target.value);
                    if (state.tvSearchTerm !== term) { 
                        state.tvSearchTerm = term; 
                        localStorage.setItem('search_query', term);
                        UIManager.refresh(); 
                    }
                }, 150);
            });
            cBtn.addEventListener('click', () => {
                gInput.value = '';
                state.tvSearchTerm = '';
                localStorage.removeItem('search_query');
                cBtn.style.display = 'none';
                gInput.focus();
                UIManager.refresh();
            });

            let touchstartX = 0; let touchendX = 0;
            const container = document.getElementById('events-container');            let isScrollActive = false;
            let startY = 0;

            const handleGesture = (e) => {
                if (isScrollActive) return;
                
                const swipeThreshold = 75;
                const diffX = touchendX - touchstartX;
                const diffY = Math.abs(e.changedTouches[0].screenY - startY);

                // Solo disparamos si el movimiento es horizontal y no vertical
                if (Math.abs(diffX) > swipeThreshold && Math.abs(diffX) > diffY) {
                    const newTab = (diffX > 0 && currentTab === 'channels') ? 'home' : (diffX < 0 && currentTab === 'home') ? 'channels' : null;
                    if (newTab) {
                        container.classList.add('tab-transitioning');
                        setTimeout(() => {
                            UIManager.switchTab(newTab);
                            container.classList.remove('tab-transitioning');
                        }, 300);
                    }
                }
            };            const handleTouchStart = e => {
                const wrapper = e.target.closest('.channels-wrapper');
                isScrollActive = wrapper && (wrapper.scrollWidth > wrapper.clientWidth);
                touchstartX = e.changedTouches[0].screenX;
                startY = e.changedTouches[0].screenY;
            };

            container.addEventListener('touchstart', handleTouchStart, {passive: true});
            document.getElementById('noResultsContainer').addEventListener('touchstart', handleTouchStart, {passive: true});            const handleTouchEnd = e => {
                touchendX = e.changedTouches[0].screenX;
                
                handleGesture(e);
            };            container.addEventListener('touchend', handleTouchEnd, {passive: true});
            document.getElementById('noResultsContainer').addEventListener('touchend', handleTouchEnd, {passive: true});

            window.addEventListener('focus', () => RatingEngine.checkPreviousSession());
            aceStreamMap = AceStreamEngine.loadFromCache();
            if (globalData.length > 0 || aceStreamMap.length > 0) {
                UIManager.refresh();
                UIManager.status.style.display = 'none';
            }            try {
                const [gistResult, html] = await Promise.all([
                    NetworkService.fetchLogos().catch(() => null), 
                    NetworkService.fetchHtml(CONFIG.TARGET_URL).catch(() => null)
                ]);

                if (gistResult) {
                    channelLogosMap = gistResult.logoMap;
                    channelCanonicalMap = gistResult.canonicalMap;
                    localStorage.setItem('logo_cache', JSON.stringify(gistResult.logoMap));
                    localStorage.setItem('canonical_cache', JSON.stringify(gistResult.canonicalMap));
                }

                if (html) {
                    const freshData = DataParser.parse(html);
                    if (freshData && freshData.length > 0) {
                        globalData = freshData;
                        localStorage.setItem('event_data_cache', JSON.stringify(freshData));
                    }
                }

                aceStreamMap = await AceStreamEngine.init();
                UIManager.refresh();
            } catch (err) {
                console.error("Error en carga:", err);
            } finally {
                UIManager.status.style.display = 'none';
                document.body.classList.add('loading-finished');
                if (globalData.length === 0 && aceStreamMap.length === 0) {
                    document.getElementById('noResultsContainer').style.display = 'block';
                }
            }
        }        init();        window.syncMarker = () => {
            const marker = document.getElementById('real-time-marker');
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            if (marker) {
                marker.textContent = timeStr;
            }
            return timeStr;
        };        const startMasterClock = () => {
            const forceUpdate = () => {
                window.syncMarker();
                if (typeof UIManager !== 'undefined' && state.tvSearchTerm === '') {
                    UIManager.refresh();
                }
            };

            const scheduleNext = () => {
                const now = new Date();
                const msUntilNextMinute = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
                
                setTimeout(() => {
                    forceUpdate();
                    scheduleNext();
                }, msUntilNextMinute);
            };

            scheduleNext();
            window.syncMarker();
        };
        startMasterClock();

        // Lógica de autorefresco a las 00:00:03
        const scheduleMidnightRefresh = () => {
            const now = new Date();
            const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 5, 0);
            const msUntilRefresh = midnight.getTime() - now.getTime();
            
            setTimeout(() => {
                localStorage.removeItem('event_data_cache');
                location.reload();
            }, msUntilRefresh);
        };        const checkDateChange = async () => {
            try {
                let needsRefresh = false;

                // 1. Comprobar Eventos (FTV)
                const html = await NetworkService.fetchHtml(CONFIG.TARGET_URL);
                const freshData = DataParser.parse(html);
                
                if (freshData && freshData.length > 0) {
                    const newHash = AceStreamEngine.generateHash(JSON.stringify(freshData));
                    if (newHash !== localStorage.getItem('current_data_hash')) {
                        localStorage.setItem('current_data_hash', newHash);
                        globalData = freshData;
                        localStorage.setItem('event_data_cache', JSON.stringify(freshData));
                        needsRefresh = true;
                    }
                }

                // 2. Comprobar Canales (ERA y ELC)
                // Leemos el timestamp actual de la caché de canales antes de actualizar
                const cacheRaw = localStorage.getItem(STORAGE_CONFIG.CACHE_KEY);
                const oldAceTimestamp = cacheRaw ? JSON.parse(cacheRaw).timestamp : 0;
                
                // El init() de AceStreamEngine ya comprueba sus propios Hashes internamente
                aceStreamMap = await AceStreamEngine.init();
                
                // Comparamos el timestamp para saber si init() descargó e inyectó canales nuevos
                const cacheRawNew = localStorage.getItem(STORAGE_CONFIG.CACHE_KEY);
                const newAceTimestamp = cacheRawNew ? JSON.parse(cacheRawNew).timestamp : 0;

                if (oldAceTimestamp !== newAceTimestamp) {
                    needsRefresh = true;
                }

                // 3. Refrescar UI solo si hubo cambios reales en FTV o ERA/ELC
                if (needsRefresh && typeof UIManager !== 'undefined' && state.tvSearchTerm === '') {
                    UIManager.refresh();
                }
            } catch (e) {
                // Si no hay red, ignoramos silenciosamente para no borrar la pantalla
            }
        };

        window.addEventListener('focus', () => {
            checkDateChange();
            if (window.syncMarker) window.syncMarker();
            if (typeof UIManager !== 'undefined' && state.tvSearchTerm === '') UIManager.refresh();
        });
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                if (window.syncMarker) window.syncMarker();
                if (typeof UIManager !== 'undefined' && state.tvSearchTerm === '') UIManager.refresh();
            }
        });
        checkDateChange();        scheduleMidnightRefresh();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'tv-final-v1';
                    self.addEventListener('install', e => {
                        self.skipWaiting();
                        e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll([location.pathname])));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                    });`;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' });
            });
        }
        </script></body></html>
