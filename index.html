<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Bro Edge Navigation</title>
    <style>
        /* 1. OCULTAMOS EL CURSOR EN TODA LA WEB */
        * { cursor: none !important; }

        body {
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita que la web haga scroll */
            font-family: sans-serif;
        }

        /* Cuadrícula 3x3 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 160px);
            gap: 20px;
            justify-content: center;
            align-content: center;
            height: 100vh;
        }

        .caja {
            width: 160px;
            height: 160px;
            background: #222;
            border: 5px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            border-radius: 15px;
            transition: 0.2s;
        }

        /* Estilo para el elemento seleccionado */
        .activo {
            border-color: #ff3c00;
            background: #441a00;
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(255, 60, 0, 0.6);
        }

        /* SENSORES DE BORDE (Invisibles) */
        .sensor {
            position: fixed;
            z-index: 9999;
            /* background: rgba(255, 255, 255, 0.1); */ /* Descomenta para verlos al probar */
        }
        .s-top    { top: 0; left: 0; width: 100%; height: 40px; }
        .s-bottom { bottom: 0; left: 0; width: 100%; height: 40px; }
        .s-left   { top: 0; left: 0; width: 40px; height: 100%; }
        .s-right  { top: 0; right: 0; width: 40px; height: 100%; }
        
        /* Zona Neutral para resetear el joystick */
        .s-center {
            top: 20%; left: 20%; width: 60%; height: 60%;
        }
    </style>
</head>
<body>

    <div class="sensor s-top"    onmouseenter="accionar('up')"></div>
    <div class="sensor s-bottom" onmouseenter="accionar('down')"></div>
    <div class="sensor s-left"   onmouseenter="accionar('left')"></div>
    <div class="sensor s-right"  onmouseenter="accionar('right')"></div>
    <div class="sensor s-center" onmouseenter="resetReady()"></div>

    <div class="grid">
        <div class="caja activo">1</div>
        <div class="caja">2</div>
        <div class="caja">3</div>
        <div class="caja">4</div>
        <div class="caja">5</div>
        <div class="caja">6</div>
        <div class="caja">7</div>
        <div class="caja">8</div>
        <div class="caja">9</div>
    </div>

    <script>
        const celdas = document.querySelectorAll('.caja');
        let fila = 0;
        let col = 0;
        let listoParaMover = true; // Control de "Joystick"

        function refrescarUI() {
            celdas.forEach(c => c.classList.remove('activo'));
            const index = (fila * 3) + col;
            celdas[index].classList.add('activo');
        }

        function accionar(direccion) {
            // Solo movemos si el ratón ha pasado por el centro antes
            // para evitar que se mueva infinitamente al dejarlo en el borde
            if (!listoParaMover) return;

            if (direccion === 'up' && fila > 0) fila--;
            if (direccion === 'down' && fila < 2) fila++;
            if (direccion === 'left' && col > 0) col--;
            if (direccion === 'right' && col < 2) col++;

            refrescarUI();
            listoParaMover = false; // Bloqueamos hasta que vuelva al centro
        }

        // Esta función se activa cuando el ratón sale del borde y va al centro
        function resetReady() {
            listoParaMover = true;
        }
        
        // También permitimos el Enter del mando si llegara a funcionar
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const index = (fila * 3) + col;
                celdas[index].style.backgroundColor = 'white';
                setTimeout(() => celdas[index].style.backgroundColor = '', 200);
            }
        });
    </script>
</body>
</html>
