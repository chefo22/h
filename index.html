<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Source Viewer (GitHub Edition)</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --success: #238636; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); font-size: 1.5rem; }
        
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
        
        button { 
            width: 100%; padding: 16px; background-color: var(--success); color: white; border: none; 
            border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #21262d; color: #484f58; }

        #status { text-align: center; margin: 15px 0; font-family: monospace; color: #d29922; }
        
        pre { 
            background: #010409; padding: 15px; border-radius: 6px; overflow-x: auto; 
            font-size: 12px; color: #79c0ff; border: 1px solid #30363d; max-height: 500px;
            white-space: pre-wrap; line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Source Viewer: One Piece</h1>
        <p>Extrayendo de: kurigames.com</p>
    </div>

    <div class="card">
        <button id="btn" onclick="fetchSource()">🚀 Obtener Código Fuente</button>
        <div id="status">Listo para conectar</div>
        <pre id="output">El código aparecerá aquí...</pre>
    </div>
</div>

<script>
    async function fetchSource() {
        const btn = document.getElementById('btn');
        const out = document.getElementById('output');
        const status = document.getElementById('status');
        const target = 'https://kurigames.com/one-piece-card-game/';
        
        btn.disabled = true;
        status.innerText = "⚡ Conectando a través de Proxy Seguro...";
        out.textContent = "Cargando datos...";

        try {
            // Usamos AllOrigins, que funciona perfectamente desde dominios https (como GitHub)
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(target)}`);
            
            if (!response.ok) throw new Error("Error en la red");
            
            const data = await response.json();
            
            if (data.contents) {
                out.textContent = data.contents;
                status.innerHTML = "<span style='color:#3fb950'>✅ ¡Código obtenido con éxito!</span>";
            } else {
                throw new Error("Contenido vacío");
            }
        } catch (error) {
            status.innerHTML = "<span style='color:#f85149'>❌ Error al obtener datos</span>";
            out.textContent = "Error: " + error.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
