<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo TV Navigation - Mouse to Arrows</title>
    <style>
        /* Ocultar el cursor en toda la pantalla */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            cursor: none; /* Intentar ocultar el ratón simulado */
            overflow: hidden;
        }

        h1 { margin-bottom: 20px; font-size: 1.5rem; }

        /* Contenedor de la cuadrícula */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            grid-template-rows: repeat(3, 150px);
            gap: 20px;
        }

        /* Estilo de los botones */
        .grid-item {
            background-color: #333;
            border: 4px solid transparent;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #aaa;
            transition: all 0.2s ease;
        }

        /* Estilo cuando el botón tiene el FOCO (simulando selección de TV) */
        .grid-item:focus {
            outline: none;
            border-color: #00ff88;
            background-color: #444;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .debug-info {
            margin-top: 30px;
            padding: 10px;
            background: #000;
            border-radius: 5px;
            font-family: monospace;
            color: #00ff88;
        }
    </style>
</head>
<body>

    <h1>Test de Navegación TV</h1>
    
    <div class="grid-container">
        <button class="grid-item" id="b1">1</button>
        <button class="grid-item" id="b2">2</button>
        <button class="grid-item" id="b3">3</button>
        <button class="grid-item" id="b4">4</button>
        <button class="grid-item" id="b5">5</button>
        <button class="grid-item" id="b6">6</button>
        <button class="grid-item" id="b7">7</button>
        <button class="grid-item" id="b8">8</button>
        <button class="grid-item" id="b9">9</button>
    </div>

    <div class="debug-info" id="debug">Mueve el ratón para empezar</div>

    <script>
        // --- CONFIGURACIÓN ---
        const THRESHOLD = 40; // Píxeles de movimiento necesarios
        const debugElement = document.getElementById('debug');
        
        let lastX = null;
        let lastY = null;

        // Poner el foco inicial en el centro (botón 5)
        document.getElementById('b5').focus();

        // --- LÓGICA DE CONVERSIÓN ---
        document.addEventListener('mousemove', (e) => {
            if (lastX === null || lastY === null) {
                lastX = e.clientX;
                lastY = e.clientY;
                return;
            }

            const diffX = e.clientX - lastX;
            const diffY = e.clientY - lastY;

            let direction = null;

            // Detectar dirección
            if (Math.abs(diffY) > THRESHOLD) {
                direction = diffY > 0 ? 'ArrowDown' : 'ArrowUp';
            } else if (Math.abs(diffX) > THRESHOLD) {
                direction = diffX > 0 ? 'ArrowRight' : 'ArrowLeft';
            }

            if (direction) {
                simulateKeyPress(direction);
                // Reiniciamos las coordenadas para el siguiente "paso"
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        function simulateKeyPress(key) {
            debugElement.textContent = "Acción: " + key;
            
            // Creamos el evento de teclado
            const event = new KeyboardEvent('keydown', {
                key: key,
                code: key,
                bubbles: true,
                cancelable: true
            });

            // Disparamos el evento
            document.dispatchEvent(event);

            // Ayudamos al navegador a mover el foco manualmente si es necesario
            moveFocus(key);
        }

        // Esta función ayuda a que el foco salte entre los botones de la cuadrícula
        function moveFocus(key) {
            const current = document.activeElement;
            if (!current || !current.id.startsWith('b')) return;

            const id = parseInt(current.id.replace('b', ''));
            let nextId = id;

            if (key === 'ArrowUp' && id > 3) nextId -= 3;
            if (key === 'ArrowDown' && id <= 6) nextId += 3;
            if (key === 'ArrowLeft' && id % 3 !== 1) nextId -= 1;
            if (key === 'ArrowRight' && id % 3 !== 0) nextId += 1;

            const nextElement = document.getElementById('b' + nextId);
            if (nextElement) nextElement.focus();
        }
    </script>
</body>
</html>
