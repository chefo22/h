<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Demo - Sensor System</title>
    <style>
        body {
            margin: 0; background: #111; color: white;
            font-family: sans-serif; overflow: hidden;
            display: flex; align-items: center; justify-content: center; height: 100vh;
        }

        /* 1. La cuadrícula de 3x3 */
        .grid {
            display: grid; grid-template-columns: repeat(3, 120px);
            gap: 15px; position: relative; z-index: 10;
        }
        .item {
            width: 120px; height: 120px; background: #333;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 2rem; border: 4px solid transparent;
        }
        .item.active {
            border-color: #00ffcc; background: #444; transform: scale(1.1);
        }

        /* 2. LOS SENSORES: Estos ocupan toda la pantalla detrás */
        .sensor-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 2fr 1fr; z-index: 5;
        }
        .sensor { 
            /* background: rgba(255,0,0,0.1); /* Descomenta para ver los sensores */
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Indicador de depuración */
        #status { position: fixed; top: 10px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <div id="status">Pasa el puntero por los bordes...</div>

    <div class="sensor-layer">
        <div class="sensor" onmouseover="move('up-left')"></div>
        <div class="sensor" onmouseover="move('up')"></div>
        <div class="sensor" onmouseover="move('up-right')"></div>
        
        <div class="sensor" onmouseover="move('left')"></div>
        <div class="sensor" onmouseover="resetMove()"></div> <div class="sensor" onmouseover="move('right')"></div>
        
        <div class="sensor" onmouseover="move('down-left')"></div>
        <div class="sensor" onmouseover="move('down')"></div>
        <div class="sensor" onmouseover="move('down-right')"></div>
    </div>

    <div class="grid">
        <div class="item" id="i0">1</div>
        <div class="item" id="i1">2</div>
        <div class="item" id="i2">3</div>
        <div class="item" id="i3">4</div>
        <div class="item" id="i4">5</div>
        <div class="item" id="i5">6</div>
        <div class="item" id="i6">7</div>
        <div class="item" id="i7">8</div>
        <div class="item" id="i8">9</div>
    </div>

    <script>
        let currentIndex = 4; // Empezamos en el 5
        let canMove = true;   // Para evitar que se mueva infinitamente

        function update() {
            document.querySelectorAll('.item').forEach((el, idx) => {
                el.classList.toggle('active', idx === currentIndex);
            });
        }

        function move(dir) {
            if (!canMove) return;

            document.getElementById('status').innerText = "Último movimiento: " + dir;

            if (dir.includes('up') && currentIndex > 2) currentIndex -= 3;
            if (dir.includes('down') && currentIndex < 6) currentIndex += 3;
            if (dir.includes('left') && currentIndex % 3 !== 0) currentIndex -= 1;
            if (dir.includes('right') && (currentIndex + 1) % 3 !== 0) currentIndex += 1;

            update();
            canMove = false; // Bloqueamos hasta que el puntero pase por el centro
        }

        // El usuario debe volver a llevar el ratón al área central para "desbloquear" otro movimiento
        function resetMove() {
            canMove = true;
            document.getElementById('status').innerText = "Listo para mover";
        }

        // Ejecutar al inicio
        update();
    </script>
</body>
</html>
