<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Demo - Scroll Method</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #111; color: white;
            overflow: hidden; /* Evitamos el scroll real */
            font-family: sans-serif;
        }

        /* 1. El área de detección (Gigante para permitir scroll interno) */
        #scroll-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 200vw; /* El doble del ancho */
            height: 200vh; /* El doble del alto */
            overflow: scroll;
            z-index: 1;
        }

        /* Contenido falso para forzar al navegador a creer que hay scroll */
        #dummy-content { width: 400vw; height: 400vh; }

        /* 2. La interfaz visual (encima de todo) */
        .ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10;
            pointer-events: none; /* Deja que el scroll pase a la capa de abajo */
        }

        .grid {
            display: grid; grid-template-columns: repeat(3, 120px);
            gap: 15px; pointer-events: auto; /* Los botones sí captan clics */
        }

        .item {
            width: 120px; height: 120px; background: #333;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-size: 2rem; border: 4px solid transparent;
        }

        .item.active {
            border-color: #ff0055; background: #444; transform: scale(1.1);
        }

        #status { margin-bottom: 20px; color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

    <div id="scroll-canvas">
        <div id="dummy-content"></div>
    </div>

    <div class="ui-layer">
        <div id="status">HAZ CLIC UNA VEZ PARA EMPEZAR</div>
        <div class="grid">
            <div class="item" id="i0">1</div>
            <div class="item" id="i1">2</div>
            <div class="item" id="i2">3</div>
            <div class="item" id="i3">4</div>
            <div class="item" id="i4">5</div>
            <div class="item" id="i5">6</div>
            <div class="item" id="i6">7</div>
            <div class="item" id="i7">8</div>
            <div class="item" id="i8">9</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('scroll-canvas');
        const status = document.getElementById('status');
        let currentIndex = 4;
        let isReady = false;

        // Centramos el scroll al inicio
        function centerScroll() {
            canvas.scrollLeft = window.innerWidth / 2;
            canvas.scrollTop = window.innerHeight / 2;
        }

        function update() {
            document.querySelectorAll('.item').forEach((el, idx) => {
                el.classList.toggle('active', idx === currentIndex);
            });
        }

        // Importante: El navegador necesita un clic para "activar" la escucha
        window.addEventListener('mousedown', () => {
            if (!isReady) {
                isReady = true;
                status.innerText = "¡SISTEMA ACTIVO! Mueve el mando.";
                centerScroll();
            }
        });

        canvas.addEventListener('scroll', () => {
            if (!isReady) return;

            const diffX = canvas.scrollLeft - (window.innerWidth / 2);
            const diffY = canvas.scrollTop - (window.innerHeight / 2);
            const threshold = 20; // Sensibilidad

            let moved = false;

            if (Math.abs(diffY) > threshold) {
                if (diffY > 0 && currentIndex < 6) { currentIndex += 3; moved = true; }
                else if (diffY < 0 && currentIndex > 2) { currentIndex -= 3; moved = true; }
            } else if (Math.abs(diffX) > threshold) {
                if (diffX > 0 && (currentIndex + 1) % 3 !== 0) { currentIndex += 1; moved = true; }
                else if (diffX < 0 && currentIndex % 3 !== 0) { currentIndex -= 1; moved = true; }
            }

            if (moved) {
                update();
                // Recentramos para permitir el siguiente movimiento
                centerScroll();
            }
        }, { passive: true });

        update();
        centerScroll();
    </script>
</body>
</html>
