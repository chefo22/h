<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Serve Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #1c1c1e;
            --primary: #58a6ff; /* Tu color de acento preferido */
            --text: #f0f6fc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        h1 { font-size: 1.4rem; margin-bottom: 20px; text-align: center; color: var(--primary); }
        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.98); }
        #player-wrapper {
            margin-top: 25px;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            display: none; /* Oculto hasta que cargue el vídeo */
        }
        video { width: 100%; height: 100%; }
        .status { font-size: 0.75rem; color: #8b949e; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AceServe Player Demo</h1>
        
        <input type="text" id="aceInput" placeholder="Pega el Hash o enlace acestream://">
        
        <button onclick="playStream()">REPRODUCIR AHORA</button>

        <div id="player-wrapper">
            <video id="video" controls></video>
        </div>
        
        <div id="status" class="status">Asegúrate de que Ace Serve esté iniciado en el puerto 6878</div>
    </div>

    <script>
        const hls = new Hls();

        function playStream() {
            const input = document.getElementById('aceInput').value.trim();
            const video = document.getElementById('video');
            const wrapper = document.getElementById('player-wrapper');
            const status = document.getElementById('status');

            if (!input) return alert("Por favor, pega un enlace");

            // 1. Limpiamos el input para obtener solo el Hash
            const hash = input.replace('acestream://', '').split(/[?&]/)[0];

            if (hash.length !== 40) {
                return alert("El ID debe tener 40 caracteres");
            }

            // 2. Construimos la URL mágica de Ace Serve (Localhost)
            const streamUrl = `http://127.0.0.1:6878/ace/manifest.m3u8?id=${hash}`;

            status.textContent = "Conectando con Ace Serve...";
            wrapper.style.display = 'block';

            // 3. Lógica de reproducción hls.js
            if (Hls.isSupported()) {
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                    status.textContent = "Reproduciendo contenido de forma nativa ✓";
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        status.textContent = "Error: El motor no responde. ¿Está Ace Serve abierto?";
                        console.error("HLS Error:", data);
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Soporte nativo para Safari o navegadores que no necesitan hls.js
                video.src = streamUrl;
                video.play();
            }
        }
    </script>
</body>
</html>
