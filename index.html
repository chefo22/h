<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug TV Navigation</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            cursor: none; /* Oculta el ratón */
            font-family: sans-serif;
            overflow: hidden;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 15px;
        }

        .item {
            width: 120px;
            height: 120px;
            background: #333;
            border: 5px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 10px;
        }

        /* Clase para el elemento seleccionado */
        .item.active {
            border-color: #00fbff;
            background: #444;
            transform: scale(1.1);
            box-shadow: 0 0 15px #00fbff;
        }

        #log {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="grid" id="grid">
        <div class="item" id="i0">1</div>
        <div class="item" id="i1">2</div>
        <div class="item" id="i2">3</div>
        <div class="item" id="i3">4</div>
        <div class="item" id="i4">5</div>
        <div class="item" id="i5">6</div>
        <div class="item" id="i6">7</div>
        <div class="item" id="i7">8</div>
        <div class="item" id="i8">9</div>
    </div>

    <div id="log">Mueve el mando para probar...</div>

    <script>
        const log = document.getElementById('log');
        const items = document.querySelectorAll('.item');
        let currentIndex = 4; // Empezamos en el centro (índice 4 = número 5)
        
        // Sensibilidad: cuántos píxeles debe moverse el ratón simulado
        const SENSITIVITY = 30; 
        let lastX = null;
        let lastY = null;

        // Función para actualizar visualmente qué cuadro está activo
        function updateActive() {
            items.forEach(item => item.classList.remove('active'));
            items[currentIndex].classList.add('active');
        }

        // Inicializamos el primer estado
        updateActive();

        window.addEventListener('mousemove', (e) => {
            // Si es la primera vez que detectamos movimiento, guardamos posición y salimos
            if (lastX === null || lastY === null) {
                lastX = e.clientX;
                lastY = e.clientY;
                return;
            }

            const diffX = e.clientX - lastX;
            const diffY = e.clientY - lastY;

            let moved = false;

            // Lógica de movimiento manual en la cuadrícula 3x3
            if (Math.abs(diffY) > SENSITIVITY) {
                if (diffY > 0 && currentIndex < 6) { // Abajo
                    currentIndex += 3;
                    log.innerText = "Movimiento: ABAJO";
                    moved = true;
                } else if (diffY < 0 && currentIndex > 2) { // Arriba
                    currentIndex -= 3;
                    log.innerText = "Movimiento: ARRIBA";
                    moved = true;
                }
            } else if (Math.abs(diffX) > SENSITIVITY) {
                if (diffX > 0 && (currentIndex + 1) % 3 !== 0) { // Derecha
                    currentIndex += 1;
                    log.innerText = "Movimiento: DERECHA";
                    moved = true;
                } else if (diffX < 0 && currentIndex % 3 !== 0) { // Izquierda
                    currentIndex -= 1;
                    log.innerText = "Movimiento: IZQUIERDA";
                    moved = true;
                }
            }

            if (moved) {
                updateActive();
                // Bloqueamos la posición actual para esperar el siguiente "paso"
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        // Simular el CLICK del mando
        window.addEventListener('mousedown', () => {
            log.innerText = "BOTÓN PULSADO en el número: " + (currentIndex + 1);
            items[currentIndex].style.backgroundColor = "#00fbff";
            setTimeout(() => {
                items[currentIndex].style.backgroundColor = "#444";
            }, 200);
        });

    </script>
</body>
</html>
