<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor de Navegación por Zonas</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }

        /* Cuadrícula 3x3 */
        .contenedor-web {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            gap: 20px;
            justify-content: center;
            align-content: center;
            height: 100vh;
        }

        .item {
            width: 150px; height: 150px;
            background: #333; border: 5px solid transparent;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; border-radius: 15px;
        }

        /* Cuando el "joystick" activa un botón */
        .item:focus {
            outline: none;
            border-color: #ff0055;
            background: #444;
            transform: scale(1.1);
        }

        /* EL JOYSTICK INVISIBLE (Lo pongo visible para que lo veas ahora) */
        #joystick {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.1); /* Cambia a 0 después */
            border-radius: 50%;
            z-index: 10000;
            border: 2px solid #555;
        }

        /* Subzonas del joystick */
        .zona { position: absolute; }
        .arriba  { top: 0; left: 40px; width: 80px; height: 50px; background: rgba(255,0,0,0.2); }
        .abajo   { bottom: 0; left: 40px; width: 80px; height: 50px; background: rgba(0,255,0,0.2); }
        .izq     { left: 0; top: 40px; width: 50px; height: 80px; background: rgba(0,0,255,0.2); }
        .der     { right: 0; top: 40px; width: 50px; height: 80px; background: rgba(255,255,0,0.2); }
    </style>
</head>
<body>

    <div class="contenedor-web">
        <div class="item" tabindex="0">1</div>
        <div class="item" tabindex="0">2</div>
        <div class="item" tabindex="0">3</div>
        <div class="item" tabindex="0">4</div>
        <div class="item" tabindex="0">5</div>
        <div class="item" tabindex="0">6</div>
        <div class="item" tabindex="0">7</div>
        <div class="item" tabindex="0">8</div>
        <div class="item" tabindex="0">9</div>
    </div>

    <div id="joystick">
        <div class="zona arriba" onmouseenter="mover('up')"></div>
        <div class="zona abajo"  onmouseenter="mover('down')"></div>
        <div class="zona izq"    onmouseenter="mover('left')"></div>
        <div class="zona der"    onmouseenter="mover('right')"></div>
    </div>

    <script>
        const items = document.querySelectorAll('.item');
        let fila = 0;
        let col = 0;

        function actualizar() {
            // Cálculo del índice: (Fila * Ancho) + Columna
            const indice = (fila * 3) + col;
            items[indice].focus();
        }

        function mover(dir) {
            if (dir === 'up' && fila > 0) fila--;
            if (dir === 'down' && fila < 2) fila++;
            if (dir === 'left' && col > 0) col--;
            if (dir === 'right' && col < 2) col++;
            
            actualizar();
        }

        // Iniciar con el primer elemento
        items[0].focus();
    </script>
</body>
</html>
