<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Demo TV - Zonas Sensibles</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --grid-color: #222;
            --active-color: #ff3e00;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            cursor: none; /* Ocultamos el ratón */
        }

        /* Cuadrícula de prueba 3x3 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            z-index: 10;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 20px;
        }

        .cell {
            width: 120px;
            height: 120px;
            background: var(--grid-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            border: 4px solid transparent;
            transition: all 0.15s ease;
        }

        /* Clase que indica dónde está el "foco" */
        .cell.selected {
            border-color: var(--active-color);
            background: #333;
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 62, 0, 0.4);
        }

        /* ZONAS DE CONTROL (Invisibles para el usuario final) */
        .sensor {
            position: fixed;
            z-index: 5;
            /* background: rgba(255, 255, 255, 0.03); /* Descomenta para ver las zonas */
        }

        #up    { top: 0; left: 25%; width: 50%; height: 20%; }
        #down  { bottom: 0; left: 25%; width: 50%; height: 20%; }
        #left  { top: 25%; left: 0; width: 20%; height: 50%; }
        #right { top: 25%; right: 0; width: 20%; height: 50%; }
        #center { top: 30%; left: 30%; width: 40%; height: 40%; }

        #info {
            position: fixed;
            bottom: 20px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Demo de Navegación</h1>
        <div class="grid" id="grid">
            <div class="cell" id="c0">1</div>
            <div class="cell" id="c1">2</div>
            <div class="cell" id="c2">3</div>
            <div class="cell" id="c3">4</div>
            <div class="cell" id="c4">5</div>
            <div class="cell" id="c5">6</div>
            <div class="cell" id="c6">7</div>
            <div class="cell" id="c7">8</div>
            <div class="cell" id="c8">9</div>
        </div>
        <div id="info">Mueve el puntero a los bordes de la pantalla</div>
    </div>

    <div class="sensor" id="up"></div>
    <div class="sensor" id="down"></div>
    <div class="sensor" id="left"></div>
    <div class="sensor" id="right"></div>
    <div class="sensor" id="center"></div>

    <script>
        let currentIndex = 4; // Empezamos en el 5
        let canMove = true;   // Control de flujo (debe volver al centro)

        const cells = document.querySelectorAll('.cell');

        function updateUI() {
            cells.forEach(c => c.classList.remove('selected'));
            cells[currentIndex].classList.add('selected');
        }

        function move(direction) {
            if (!canMove) return;

            if (direction === 'up' && currentIndex > 2) currentIndex -= 3;
            if (direction === 'down' && currentIndex < 6) currentIndex += 3;
            if (direction === 'left' && currentIndex % 3 !== 0) currentIndex -= 1;
            if (direction === 'right' && (currentIndex + 1) % 3 !== 0) currentIndex += 1;

            updateUI();
            canMove = false; // Bloqueamos movimiento hasta que vuelva al centro
            console.log("Movido a: " + direction);
        }

        // Listeners para los sensores
        document.getElementById('up').onmouseover = () => move('up');
        document.getElementById('down').onmouseover = () => move('down');
        document.getElementById('left').onmouseover = () => move('left');
        document.getElementById('right').onmouseover = () => move('right');

        // El centro desbloquea el movimiento (actúa como el "neutral" del joystick)
        document.getElementById('center').onmouseover = () => {
            canMove = true;
            console.log("Joystick en posición NEUTRAL");
        };

        // Simular click
        window.onclick = () => {
            const activeCell = cells[currentIndex];
            activeCell.style.backgroundColor = "white";
            activeCell.style.color = "black";
            setTimeout(() => {
                activeCell.style.backgroundColor = "";
                activeCell.style.color = "";
            }, 200);
        };

        // Inicio
        updateUI();
    </script>
</body>
</html>
