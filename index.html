<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TV Remote Hack - Invisible Joystick</title>
    <style>
        body { background-color: #1a1a1a; color: white; margin: 0; overflow: hidden; font-family: sans-serif; }

        /* Cuadrícula de prueba */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 15px;
            justify-content: center;
            align-content: center;
            height: 100vh;
        }

        .btn {
            width: 120px; height: 120px;
            background: #444; border: 4px solid transparent;
            color: white; font-size: 2rem;
        }

        /* Estilo del botón enfocado */
        .btn:focus {
            outline: none;
            border-color: #00ffcc;
            transform: scale(1.1);
            background: #555;
        }

        /* LA VENTANA INVISIBLE (El "Joystick") */
        #joystick-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1); /* Cambia a 0 para total invisibilidad */
            border: 2px dashed #777;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sensor {
            position: absolute;
            background: rgba(255, 0, 0, 0.2); /* Solo para ver dónde tocas */
        }

        /* Áreas de colisión */
        .up    { top: 0; left: 0; width: 100%; height: 30%; }
        .down  { bottom: 0; left: 0; width: 100%; height: 30%; }
        .left  { left: 0; top: 0; width: 30%; height: 100%; }
        .right { right: 0; top: 0; width: 30%; height: 100%; }
    </style>
</head>
<body>

    <div class="grid">
        <button class="btn" tabindex="0">1</button>
        <button class="btn" tabindex="0">2</button>
        <button class="btn" tabindex="0">3</button>
        <button class="btn" tabindex="0">4</button>
        <button class="btn" tabindex="0">5</button>
        <button class="btn" tabindex="0">6</button>
        <button class="btn" tabindex="0">7</button>
        <button class="btn" tabindex="0">8</button>
        <button class="btn" tabindex="0">9</button>
    </div>

    <div id="joystick-container">
        <div class="sensor up" data-dir="up"></div>
        <div class="sensor down" data-dir="down"></div>
        <div class="sensor left" data-dir="left"></div>
        <div class="sensor right" data-dir="right"></div>
        <small style="font-size: 10px; pointer-events: none;">SENSAR AQUÍ</small>
    </div>

    <script>
        const botones = document.querySelectorAll('.btn');
        let indiceActual = 0;
        let bloqueado = false; // Para evitar saltos múltiples rápidos

        // Función para mover el foco
        function mover(direccion) {
            if (bloqueado) return;

            let nuevoIndice = indiceActual;

            if (direccion === 'up' && indiceActual >= 3) nuevoIndice -= 3;
            if (direccion === 'down' && indiceActual < 6) nuevoIndice += 3;
            if (direccion === 'left' && indiceActual % 3 !== 0) nuevoIndice -= 1;
            if (direccion === 'right' && (indiceActual + 1) % 3 !== 0) nuevoIndice += 1;

            if (nuevoIndice !== indiceActual) {
                indiceActual = nuevoIndice;
                botones[indiceActual].focus();
                
                // Bloqueo temporal para que el usuario tenga que 
                // mover el ratón fuera del borde para pulsar otra vez
                bloqueado = true; 
                setTimeout(() => { bloqueado = false; }, 400); 
            }
        }

        // Configurar los sensores
        document.querySelectorAll('.sensor').forEach(sensor => {
            sensor.addEventListener('mouseenter', () => {
                const dir = sensor.getAttribute('data-dir');
                mover(dir);
            });
        });

        // Iniciar foco
        botones[0].focus();
    </script>
</body>
</html>
