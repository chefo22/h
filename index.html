<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Control TV 3x3</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Contenedor de la cuadrícula */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 150px);
            grid-template-rows: repeat(3, 150px);
            gap: 20px;
        }

        /* Estilo de los botones */
        .btn-tv {
            background-color: #333;
            border: 4px solid transparent;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        /* ESTADO CRÍTICO: Cuando el mando está sobre el botón */
        .btn-tv:focus {
            outline: none;
            border-color: #00ffcc; /* Color Neón */
            background-color: #444;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>
<body>

    <div class="grid-container" id="grid">
        <button class="btn-tv">1</button>
        <button class="btn-tv">2</button>
        <button class="btn-tv">3</button>
        <button class="btn-tv">4</button>
        <button class="btn-tv">5</button>
        <button class="btn-tv">6</button>
        <button class="btn-tv">7</button>
        <button class="btn-tv">8</button>
        <button class="btn-tv">9</button>
    </div>

    <script>
        // Configuración de la cuadrícula
        const COLUMNAS = 3;
        const FILAS = 3;
        
        // Obtenemos todos los botones en una lista plana
        const botones = document.querySelectorAll('.btn-tv');
        
        // Posición inicial
        let filaActual = 0;
        let colActual = 0;

        // Función para poner el foco basado en coordenadas
        function actualizarFoco() {
            // Fórmula para convertir (Fila, Columna) en el índice del Array (0-8)
            // Índice = (Fila * Total de Columnas) + Columna
            const indice = (filaActual * COLUMNAS) + colActual;
            botones[indice].focus();
        }

        // Iniciamos el foco en el primer botón
        actualizarFoco();

        // Escuchar eventos del mando (teclado)
        document.addEventListener('keydown', (event) => {
            switch(event.key) {
                case 'ArrowUp':
                    if (filaActual > 0) filaActual--;
                    break;
                case 'ArrowDown':
                    if (filaActual < FILAS - 1) filaActual++;
                    break;
                case 'ArrowLeft':
                    if (colActual > 0) colActual--;
                    break;
                case 'ArrowRight':
                    if (colActual < COLUMNAS - 1) colActual++;
                    break;
                case 'Enter':
                    document.activeElement.style.backgroundColor = "red";
                    setTimeout(() => document.activeElement.style.backgroundColor = "", 500);
                    break;
            }
            actualizarFoco();
        });
    </script>
</body>
</html>
